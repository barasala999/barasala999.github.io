---
layout: default
title: Baby Names
---

<h1>Latest Baby Name Articles</h1>

<div class="article-grid">

{% assign articles = site.names | sort: "date" | reverse %}

{% for article in articles %}

<div class="article-card">

    {% if article.image %}
    <img src="{{ article.image }}" alt="{{ article.title }}">
    {% endif %}

    <h2>
        <a href="{{ article.url }}">
            {{ article.title }}
        </a>
    </h2>

    <p>
        {{ article.excerpt }}
    </p>

    <a class="read-more" href="{{ article.url }}">
        Read More →
    </a>

</div>

{% endfor %}

</div>
