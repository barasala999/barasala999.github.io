title: Girl Names

<h1>Girl Names</h1>

{% assign articles = site.names
    | where: "category", "girl-names"
    | sort: "date"
    | reverse %}

{% for article in articles %}
 <div class="article-card">
    <h2>
        <a href="{{ article.url }}">{{ article.title }}</a>
    </h2>

    <p>{{ article.excerpt }}</p>
</div>
{% endfor %}
